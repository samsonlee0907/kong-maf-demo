_format_version: "3.0"
_transform: true

services:
  - name: maf-agent-ui
    url: http://host.docker.internal:8080
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: route-portal
        paths:
          - /portal
        methods:
          - GET
        strip_path: false
      - name: route-ui
        paths:
          - /ui
        methods:
          - GET
        strip_path: false

  - name: maf-agent-invoke
    url: http://host.docker.internal:8080/invoke
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: route-invoke
        paths:
          - /invoke
        methods:
          - POST
          - OPTIONS
        strip_path: true

  - name: maf-agent-stream
    url: http://host.docker.internal:8080/stream
    connect_timeout: 60000
    write_timeout: 600000
    read_timeout: 600000
    routes:
      - name: route-stream
        paths:
          - /stream
        methods:
          - POST
          - OPTIONS
        strip_path: true

  - name: maf-agent-health
    url: http://host.docker.internal:8080/health
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: route-health
        paths:
          - /health
        methods:
          - GET
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Accept-Language
        - Content-Type
        - Origin
        - X-Requested-With
        - X-Trace-Id
      exposed_headers:
        - Content-Type
        - X-Trace-Id
      max_age: 3600
      preflight_continue: false
